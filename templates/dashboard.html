<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hican Bridge Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); min-height: 100vh; color: white; }
        .card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); color: #333; }
    </style>
</head>
<body class="p-6">
    <h1 class="text-3xl font-bold text-center mb-6">Welcome, {{ profile.name }}!</h1>
    <div class="card p-6 rounded-xl shadow-lg max-w-md mx-auto">
        <h2 class="text-xl font-semibold mb-4">Your Progress</h2>
        <p>This is your personalized Hican Bridge dashboard.</p>
        <a href="/" class="block text-center mt-4 bg-blue-500 text-white p-2 rounded">Go Back Home</a>
    </div>
</body>
</html>
