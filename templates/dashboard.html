<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hican Bridge Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-center">Dashboard</h1>
        
        <div class="glass p-6 rounded-3xl mb-6">
            <h2 class="text-xl font-bold mb-4">Reading Journey</h2>
            <a href="/static/daring_greatly.pdf" target="_blank" class="block p-4 bg-blue-500/20 rounded-xl hover:bg-blue-500/40 transition text-center font-bold">
                📖 Read Daring Greatly PDF
            </a>
        </div>

        <div class="glass p-6 rounded-3xl mb-6">
            <h2 class="text-xl font-bold mb-4">Today's Mission</h2>
            {% for day, info in daily_plan.items() %}
            <div class="mb-4 p-4 bg-white/10 rounded-xl">
                <p class="font-bold">Day {{ day }}: Pages {{ info.pages }}</p>
                <input id="ans-{{ day }}" class="w-full p-2 mt-2 text-black rounded" placeholder="Answer: {{ info.question }}">
                <button onclick="submitQuiz('{{ day }}')" class="mt-2 w-full bg-green-500 py-1 rounded font-bold">Check In</button>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function submitQuiz(day) {
            const answer = document.getElementById('ans-'+day).value;
            fetch('/check-in', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: new URLSearchParams({day: day, answer: answer}) 
            })
            .then(r => r.json())
            .then(data => alert('Your score for today: ' + data.score + '%'));
        }
    </script>
</body>
</html>
