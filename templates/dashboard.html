<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hican Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(to right, #60a5fa, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-950 pb-20">
    <div class="max-w-md mx-auto p-6">
        <h1 class="text-3xl font-extrabold mb-2 gradient-text">Hican Bridge</h1>
        <p class="text-indigo-300 mb-6">Hi, {{ user.name }}!</p>

        <!-- Tabs Content -->
        <div id="tab-home" class="tab-content active">
            <div class="glass p-6 rounded-3xl mb-6 text-center border-l-4 border-indigo-500">
                <p class="italic text-lg">"{{ quote }}"</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-4 rounded-2xl text-center">
                    <p class="text-3xl font-bold text-indigo-400">5</p>
                    <p class="text-xs uppercase opacity-60">Badges</p>
                </div>
                <div class="glass p-4 rounded-2xl text-center">
                    <p class="text-3xl font-bold text-blue-400" id="streak-count">0</p>
                    <p class="text-xs uppercase opacity-60">Day Streak</p>
                </div>
            </div>
        </div>

        <div id="tab-reading" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Reading Journey</h2>
            {% for day, info in daily_plan.items() %}
            <div class="glass p-4 rounded-2xl mb-4">
                <p class="font-bold">Day {{ day }}: {{ info.pages }}</p>
                <p class="text-sm opacity-70 mb-2">{{ info.question }}</p>
                <button onclick="alert('Quiz logic here')" class="w-full bg-blue-600 py-2 rounded-xl text-sm">Submit</button>
            </div>
            {% endfor %}
        </div>

        <div id="tab-mentor" class="tab-content text-center">
            <h2 class="text-xl font-bold mb-6">AI Mentor</h2>
            <button onclick="requestCall()" class="w-24 h-24 rounded-full bg-indigo-600 flex items-center justify-center text-4xl shadow-lg mx-auto">📞</button>
            <p class="mt-4 opacity-70">Tap to start voice call</p>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 w-full glass p-4 flex justify-around border-t border-white/10">
        <button onclick="switchTab('home')">🏠</button>
        <button onclick="switchTab('reading')">📖</button>
        <button onclick="switchTab('mentor')">📞</button>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
        }
        function requestCall() { alert('Connecting to AI Voice Mentor...'); }
    </script>
</body>
</html>
