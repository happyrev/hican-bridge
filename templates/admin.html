<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Weekly Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Student Weekly Reports</h1>
        <div class="space-y-4">
            {% for report in reports %}
            <div class="glass p-4 rounded-xl border border-white/10">
                <p class="text-sm font-mono opacity-60">{{ report }}</p>
            </div>
            {% endfor %}
        </div>
        <a href="/dashboard" class="block mt-6 text-blue-400">← Back to Dashboard</a>
    </div>
</body>
</html>
