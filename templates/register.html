<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hican Bridge - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-6 flex justify-center items-center min-h-screen">
    <div class="glass p-8 rounded-3xl w-full max-w-sm border border-white/10">
        <h1 class="text-2xl font-bold mb-6 text-center">Join Hican Bridge</h1>
        <form action="/register" method="POST" class="space-y-4">
            <input name="username" placeholder="Username" class="w-full p-3 rounded-xl bg-slate-900 border border-white/10" required>
            <input name="name" placeholder="Full Name" class="w-full p-3 rounded-xl bg-slate-900 border border-white/10" required>
            <input name="age" type="number" placeholder="Age" class="w-full p-3 rounded-xl bg-slate-900 border border-white/10">
            <textarea name="bio" placeholder="Tell us about yourself" class="w-full p-3 rounded-xl bg-slate-900 border border-white/10"></textarea>
            <button type="submit" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Register</button>
        </form>
    </div>
</body>
</html>
