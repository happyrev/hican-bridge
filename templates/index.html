<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hican Bridge Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <img src="/static/assets/logo.jpg" alt="Hican Initiative Logo" class="mx-auto mb-8 w-48">
        <h1 class="text-4xl font-bold text-center mb-8 gradient-text">Hican Bridge</h1>
        
        <div class="glass p-6 rounded-3xl shadow-2xl mb-8">
            <h2 class="text-xl font-bold mb-4">AI Voice Mentor</h2>
            <p class="text-gray-400 mb-6">Talk to your mentor for this week's progress check.</p>
            <button id="voiceBtn" class="w-full py-4 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl font-bold text-lg shadow-lg hover:scale-105 transition">
                Start Voice Session
            </button>
        </div>

        <div class="glass p-6 rounded-3xl shadow-lg">
            <h2 class="text-xl font-bold mb-4">Reading Journey</h2>
            <a href="/static/daring_greatly.pdf" class="block p-4 bg-white/10 rounded-2xl border border-white/10 hover:bg-white/20 transition">
                📚 Daring Greatly - Chapters 1-4
            </a>
        </div>
    </div>

    <script>
        const btn = document.getElementById('voiceBtn');
        btn.onclick = () => {
            btn.classList.add('animate-pulse');
            btn.innerText = 'Listening...';
            // Placeholder for AI Voice streaming logic
            setTimeout(() => {
                btn.classList.remove('animate-pulse');
                btn.innerText = 'Call Ended. Sending Report...';
            }, 3000);
        };
    </script>
</body>
</html>
