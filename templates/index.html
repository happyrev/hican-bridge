<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hican Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); min-height: 100vh; }
        .nav-link { color: white; margin: 0 10px; cursor: pointer; }
    </style>
</head>
<body class="p-4">
    <nav class="flex justify-center mb-6">
        <span class="nav-link" onclick="show('profile')">Profile</span>
        <span class="nav-link" onclick="show('reading')">Reading</span>
        <span class="nav-link" onclick="show('chat')">Chat</span>
    </nav>

    <div id="profile" class="page bg-white p-6 rounded-xl shadow-lg max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4">Your Profile</h2>
        <form action="/profile" method="POST" enctype="multipart/form-data">
            <input type="text" name="name" placeholder="Name" class="w-full p-2 border mb-2 rounded" required>
            <textarea name="about" placeholder="About yourself" class="w-full p-2 border mb-2 rounded" required></textarea>
            <input type="file" name="photo" class="mb-4">
            <button type="submit" class="bg-blue-500 text-white p-2 w-full rounded hover:bg-blue-600 transition">Save Profile</button>
        </form>
    </div>

    <div id="reading" class="page hidden bg-white p-6 rounded-xl shadow-lg max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4">Daring Greatly Reading</h2>
        <div class="grid grid-cols-2 gap-4">
            <a href="/static/daring_greatly.pdf#page=1" class="p-4 bg-indigo-100 rounded text-center hover:bg-indigo-200 transition font-bold">Week 1</a>
            <a href="/static/daring_greatly.pdf#page=20" class="p-4 bg-indigo-100 rounded text-center hover:bg-indigo-200 transition font-bold">Week 2</a>
        </div>
    </div>

    <div id="chat" class="page hidden bg-white p-6 rounded-xl shadow-lg max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4">Chat with AI</h2>
        <div id="chat-box" class="h-48 border mb-2 overflow-y-scroll p-2"></div>
        <input id="chat-input" class="w-full p-2 border mb-2" placeholder="Ask anything...">
        <button onclick="sendMessage()" class="bg-purple-500 text-white p-2 w-full rounded">Send</button>
    </div>

    <script>
        function show(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
        }
        function sendMessage() {
            const input = document.getElementById('chat-input');
            fetch('/chat', { method: 'POST', body: new URLSearchParams({message: input.value}) })
                .then(r => r.text())
                .then(text => {
                    document.getElementById('chat-box').innerHTML += `<p><b>AI:</b> ${text}</p>`;
                });
        }
    </script>
</body>
</html>
